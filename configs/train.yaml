train:
  seed: 42
  batch_size: 32
  num_epochs: 50
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  max_grad_norm: 1.0

  val_ratio: 0.1
  test_ratio: 0.1

  checkpoint_dir: "checkpoints"
  patience: 10

  data_path: "data/Water_solubility_data.csv"
